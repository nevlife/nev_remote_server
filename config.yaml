# Zenoh router endpoint for vehicle and station connections
# Local test: tcp/127.0.0.1:7447
# Production: tcp/0.0.0.0:7447  (zenohd listens on this port)
zenoh_locator: "tcp/127.0.0.1:7447"

web_port: 8080

heartbeat_rate:       5.0    # Hz  : server → vehicle heartbeat
state_push_interval:  0.5    # sec : browser UI polling interval (separate from immediate push on twist/teleop receive)

station_timeout:      2.0    # sec : station heartbeat timeout

wheelbase:            0.650  # m   : wheelbase (used for teleop angular_z calculation)
